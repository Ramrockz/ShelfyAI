<!-- Switch Account Modal -->
<div class="modal-overlay" id="switchAccountModal" onclick="if(event.target === this) closeSwitchAccountModal()">
  <div class="modal-content-custom" style="max-width: 450px;">
    <h3 style="margin: 0 0 8px 0; color: var(--text-main); font-size: 24px;">Switch Account</h3>
    <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">Sign in to a different account</p>

    <!-- Tabs -->
    <div style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid var(--border);">
      <button class="switch-account-tab active" onclick="switchAccountTab('login')" style="flex: 1; padding: 12px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-muted); transition: all 0.2s; margin-bottom: -2px;">Login</button>
      <button class="switch-account-tab" onclick="switchAccountTab('signup')" style="flex: 1; padding: 12px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-muted); transition: all 0.2s; margin-bottom: -2px;">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="switch-login-content" class="switch-account-content" style="display: block;">
      <button onclick="handleSwitchGoogleLogin()" style="width: 100%; padding: 14px; background: var(--bg-inner); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; color: var(--text-main); margin-bottom: 16px;">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
          <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.426 0 9.002 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div style="display: flex; align-items: center; gap: 16px; margin: 20px 0; color: var(--text-muted); font-size: 13px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <span>or</span>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>

      <form onsubmit="handleSwitchLogin(event)">
        <div style="margin-bottom: 16px; text-align: left;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted);">Email</label>
          <input type="email" id="switch-login-email" placeholder="you@example.com" required style="width: 100%; padding: 12px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 14px;" />
        </div>

        <div style="margin-bottom: 16px; text-align: left;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted);">Password</label>
          <input type="password" id="switch-login-password" placeholder="••••••••" required style="width: 100%; padding: 12px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 14px;" />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          Sign In
        </button>
      </form>

      <div style="margin-top: 16px; text-align: center;">
        <button onclick="closeSwitchAccountModal()" style="background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; text-decoration: underline;">Cancel</button>
      </div>
    </div>

    <!-- Sign Up Form -->
    <div id="switch-signup-content" class="switch-account-content" style="display: none;">
      <button onclick="handleSwitchGoogleLogin()" style="width: 100%; padding: 14px; background: var(--bg-inner); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; color: var(--text-main); margin-bottom: 16px;">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
          <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.426 0 9.002 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div style="display: flex; align-items: center; gap: 16px; margin: 20px 0; color: var(--text-muted); font-size: 13px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <span>or</span>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>

      <form onsubmit="handleSwitchSignUp(event)">
        <div style="margin-bottom: 16px; text-align: left;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted);">Email</label>
          <input type="email" id="switch-signup-email" placeholder="you@example.com" required style="width: 100%; padding: 12px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 14px;" />
        </div>

        <div style="margin-bottom: 16px; text-align: left;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted);">Password</label>
          <input type="password" id="switch-signup-password" placeholder="••••••••" minlength="6" required style="width: 100%; padding: 12px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 14px;" />
        </div>

        <div style="margin-bottom: 16px; text-align: left;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted);">Confirm Password</label>
          <input type="password" id="switch-signup-confirm-password" placeholder="••••••••" minlength="6" required style="width: 100%; padding: 12px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 14px;" />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          Create Account
        </button>
      </form>

      <div style="margin-top: 16px; text-align: center;">
        <button onclick="closeSwitchAccountModal()" style="background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; text-decoration: underline;">Cancel</button>
      </div>
    </div>
  </div>
</div>

<style>
.switch-account-tab.active {
  color: var(--accent) !important;
  border-bottom-color: var(--accent) !important;
}
.switch-account-tab:hover {
  color: var(--text-main);
}
</style>

<script>
function switchAccountTab(tab) {
  // Update tab buttons
  document.querySelectorAll('.switch-account-tab').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  // Update tab content
  document.querySelectorAll('.switch-account-content').forEach(content => content.style.display = 'none');
  document.getElementById('switch-' + tab + '-content').style.display = 'block';
}

function closeSwitchAccountModal() {
  document.getElementById('switchAccountModal').classList.remove('active');
  // Reset forms
  document.getElementById('switch-login-email').value = '';
  document.getElementById('switch-login-password').value = '';
  document.getElementById('switch-signup-email').value = '';
  document.getElementById('switch-signup-password').value = '';
  document.getElementById('switch-signup-confirm-password').value = '';
}

async function handleSwitchGoogleLogin() {
  try {
    // Sign out current user first
    await supabaseClient.auth.signOut();
    
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.href
      }
    });

    if (error) throw error;
  } catch (error) {
    alert('Google sign-in failed: ' + error.message);
  }
}

async function handleSwitchLogin(e) {
  e.preventDefault();
  const email = document.getElementById('switch-login-email').value;
  const password = document.getElementById('switch-login-password').value;

  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Switching...';

  try {
    // Sign out current user first
    await supabaseClient.auth.signOut();
    
    // Clear cache
    sessionStorage.removeItem('shelfy_user_email');
    sessionStorage.removeItem('shelfy_user_avatar');
    
    // Sign in with new credentials
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password,
    });

    if (error) throw error;

    // Reload page to refresh UI with new user
    window.location.reload();
  } catch (error) {
    alert('Login failed: ' + error.message);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign In';
  }
}

async function handleSwitchSignUp(e) {
  e.preventDefault();
  const email = document.getElementById('switch-signup-email').value;
  const password = document.getElementById('switch-signup-password').value;
  const confirmPassword = document.getElementById('switch-signup-confirm-password').value;

  if (password !== confirmPassword) {
    alert('Passwords do not match!');
    return;
  }

  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  try {
    // Sign out current user first
    await supabaseClient.auth.signOut();
    
    // Clear cache
    sessionStorage.removeItem('shelfy_user_email');
    sessionStorage.removeItem('shelfy_user_avatar');
    
    // Sign up with new credentials
    const { data, error } = await supabaseClient.auth.signUp({
      email: email,
      password: password,
    });

    if (error) throw error;

    alert('Account created successfully! Please check your email to confirm your account.');
    
    // Switch to login tab and set email
    switchAccountTab('login');
    document.getElementById('switch-login-email').value = email;
  } catch (error) {
    alert('Sign up failed: ' + error.message);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
  }
}
</script>
